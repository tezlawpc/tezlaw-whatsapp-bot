services:
  - type: web
    name: tezlaw-whatsapp-bot
    runtime: node
    buildCommand: npm install
    startCommand: node whatsapp.js
    envVars:
      - key: WHATSAPP_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
